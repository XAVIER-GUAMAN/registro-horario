<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Horario</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- CSS Design System -->
<link rel="stylesheet" href="./css/main.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/responsive.css">

<style>
/* Application-specific styles */
.horas { font-weight: bold; color: var(--color-success); }
.control-panel { display: flex; flex-wrap: wrap; gap: var(--spacing-2); margin-bottom: var(--spacing-4); }
@media (max-width: 639px) {
  .control-panel { flex-direction: column; }
  .control-panel .btn { width: 100%; }
}
</style>
</head>

<body>

<div class="container bg-white rounded-lg shadow-md p-6 mt-4 mb-4">
  <h1 class="text-3xl font-bold text-primary mb-6">📅 Registro Horario</h1>

  <div class="form-group">
    <label for="mes" class="form-label">Seleccionar Mes</label>
    <input type="month" id="mes" class="form-input">
  </div>

  <div class="control-panel">
    <button onclick="aplicarATodos()" class="btn btn-primary">Aplicar Horario</button>
    <button onclick="guardarEnSupabase()" class="btn btn-success">💾 Guardar</button>
    <button onclick="exportarExcel()" class="btn btn-primary">📊 Exportar a Excel</button>
  </div>

  <div class="table-wrapper">
    <table id="tabla" class="table table-hover">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Día</th>
          <th>Entrada</th>
          <th>Pausa</th>
          <th>Reanuda</th>
          <th>Salida</th>
          <th class="text-center">Horas</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
